services:
  wattimize-api:
    build: .
    container_name: wattimize-api
    environment:
      WATTIMIZE_DB_PATH: /app/data/energy_samples.sqlite3
    ports:
      - "18000:8000"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
